name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Decode keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk BookWriter.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: BookWriter v1.0.0
        files: BookWriter.apk
        body: |
          BookWriter - Book Writing Assistant

          Features:
          - Create book projects with title, genre, synopsis, and target word count
          - Add and edit chapters with notes
          - Track word count and progress
          - Writing timer with session tracking
          - Daily writing goals with streak tracking
          - Character bible
          - World-building notes
          - Export manuscript as plain text or JSON
          - Dark theme with Material Design 3